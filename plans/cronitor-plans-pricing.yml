description: >-
  Cronitor offers three pricing tiers: a free Hacker plan for individual
  developers, a pay-as-you-go Business plan billed per monitor and user, and an
  Enterprise plan starting at $6,000/year with custom limits and dedicated
  support. A 14-day free trial is available for paid plans.
sources:
  - https://cronitor.io/pricing
plans:
