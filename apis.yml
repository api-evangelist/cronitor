---
aid: cronitor
name: Cronitor
description: >-
  Cronitor is a cron job and scheduled task monitoring platform that provides
  developers with instant alerts when jobs fail, run too long, or don't run at
  all. The platform offers a REST API for creating and managing monitors,
  recording job telemetry events, and configuring alert policies across teams.
  Cronitor supports job monitoring, heartbeat monitoring, website uptime checks,
  and Real User Monitoring (RUM), all accessible via a versioned HTTP API using
  Basic Auth with scoped API keys. SDKs are available for Python, Node.js, Ruby,
  PHP, Java, Go, and other languages through the cronitorio GitHub organization.
type: Index
