apis:
  - aid: cronitor:monitors-api
    name: Cronitor Monitors API
    description: >-
      The Monitors API allows creating, updating, retrieving, deleting, cloning,
      and pausing monitors for cron jobs, heartbeats, uptime checks, and sites.
      Monitors are configured with schedules, assertions, and alert preferences
      via JSON or YAML payloads authenticated with HTTP Basic Auth using an API key.
    humanURL: https://cronitor.io/docs/monitors-api
    baseURL: https://cronitor.io/api/monitors
    tags:
      - Monitors
      - Cron Jobs
      - Alerting
      - Configuration
    properties:
      - type: Documentation
        url: https://cronitor.io/docs/monitors-api
      - type: OpenAPI
        url: openapi/cronitor-monitors-api-openapi.yml
  - aid: cronitor:telemetry-api
    name: Cronitor Telemetry API
    description: >-
      The Telemetry API is the core integration mechanism for recording job
      execution events (run, complete, fail, ok) to Cronitor monitors. Events
      are sent via GET, POST, or HEAD requests to the cronitor.link domain with
      the API key embedded in the URL path, enabling lightweight pings from any
      environment.
    humanURL: https://cronitor.io/docs/telemetry-api
    baseURL: https://cronitor.link
    tags:
      - Telemetry
      - Events
      - Job Monitoring
      - Heartbeat
    properties:
      - type: Documentation
        url: https://cronitor.io/docs/telemetry-api
      - type: OpenAPI
        url: openapi/cronitor-telemetry-api-openapi.yml
  - aid: cronitor:sites-api
    name: Cronitor Sites API
    description: >-
      The Sites API enables management of Real User Monitoring (RUM) sites within
      Cronitor, allowing teams to track performance and availability data from
      real end-user browser sessions alongside synthetic and uptime monitors.
    humanURL: https://cronitor.io/docs/sites-api
    baseURL: https://cronitor.io/api
    tags:
      - Sites
      - Real User Monitoring
      - RUM
      - Performance
    properties:
      - type: Documentation
        url: https://cronitor.io/docs/sites-api
      - type: OpenAPI
        url: openapi/cronitor-groups-notifications-api-openapi.yml
